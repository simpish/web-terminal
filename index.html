<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Web Terminal</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --sidebar-w: 220px;
  }

  html {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    overscroll-behavior: none;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 14px;
  }
  /* Sidebar tabs */
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .sidebar-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .sidebar-panel { display: none; flex: 1; overflow-y: auto; }
  .sidebar-panel.active { display: flex; flex-direction: column; }

  .session-list { flex: 1; overflow-y: auto; padding: 6px; }

  /* File browser */
  .browser { flex: 1; overflow-y: auto; padding: 6px; }
  .browser-crumbs {
    padding: 6px 8px;
    font-size: 11px;
    color: var(--text-dim);
    word-break: break-all;
    line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }
  .browser-crumb {
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    font-size: 11px;
    padding: 0;
    font-family: inherit;
  }
  .browser-crumb:active { text-decoration: underline; }
  .browser-item {
    padding: 7px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 1px;
  }
  .browser-item:active { background: var(--border); }
  .browser-item .icon { font-size: 14px; }
  .browser-actions {
    padding: 6px;
    display: flex;
    gap: 4px;
  }
  .browser-actions button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .cd-btn { background: var(--accent); color: var(--bg); }
  .cd-btn:active { background: var(--accent-hover); }
  .create-session-btn { background: var(--green); color: var(--bg); }
  .create-session-btn:active { background: #2ea043; }
  .hidden-toggle {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .hidden-toggle.on { color: var(--accent); border-color: var(--accent); }
  .session-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .session-item:active, .session-item:hover { background: var(--border); }
  .session-item.active { background: var(--accent); color: var(--bg); }
  .session-item .del {
    background: none; border: none; color: var(--red);
    cursor: pointer; font-size: 14px; padding: 2px 4px;
    border-radius: 4px; display: none;
  }
  .session-item:hover .del, .session-item:active .del { display: inline; }
  .session-item.active .del { color: var(--bg); }

  .add-btn {
    margin: 6px;
    padding: 8px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* --- Main --- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 8px;
    min-height: 38px;
    flex-shrink: 0;
  }
  .menu-btn {
    background: none; border: none; color: var(--text);
    font-size: 18px; cursor: pointer; padding: 4px 6px;
    touch-action: manipulation;
  }
  .session-label {
    font-size: 13px; font-weight: 600; color: var(--accent);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-left: auto;
  }
  .dot.off { background: var(--red); }

  /* Terminal iframe */
  .term-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    touch-action: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .term-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    touch-action: auto;
  }
  .reconnect-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 11px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .reconnect-btn:active { color: var(--accent); border-color: var(--accent); }

  /* --- Bottom bar --- */
  .bottom-bar {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    overflow: visible;
  }

  /* Scrollable button rows */
  .btn-row {
    display: flex;
    gap: 3px;
    padding: 4px 6px;
    overflow-x: scroll;
    overflow-y: hidden;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
    touch-action: pan-x;
    -ms-overflow-style: none;
  }
  .btn-row::-webkit-scrollbar { display: none; }

  .btn-row + .btn-row {
    border-top: 1px solid var(--border);
  }

  /* Small key buttons */
  .kb {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 12px;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .kb:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Claude shortcut buttons */
  .kb.claude {
    background: #1a1520;
    border-color: #6e40aa;
    color: #d4a5ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
  }
  .kb.claude:active { background: #6e40aa; color: #fff; }
  .kb.claude.active { background: #6e40aa; color: #fff; }
  .claude-row.hidden { display: none; }

  /* Input row */
  .input-row {
    display: flex;
    gap: 4px;
    padding: 5px 6px;
    align-items: flex-end;
    border-top: 1px solid var(--border);
  }
  .input-row textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    min-height: 36px;
    max-height: 100px;
    line-height: 1.3;
  }
  .input-row textarea:focus { outline: none; border-color: var(--accent); }

  .input-row .act-btn {
    flex-shrink: 0;
    border: none;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    min-height: 36px;
  }
  .send-btn { background: var(--accent); color: var(--bg); }
  .send-btn:active { background: var(--accent-hover); }
  .enter-btn { background: var(--green); color: var(--bg); }
  .enter-btn:active { background: #2ea043; }

  /* Overlay */
  .overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 50;
  }
  .overlay.show { display: block; }

  /* Desktop/tablet */
  @media (min-width: 768px) {
    .sidebar { position: relative; transform: translateX(0); }
    .overlay { display: none !important; }
    .menu-btn { display: none; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>Terminal</span>
    <button class="menu-btn" id="closeSidebar">&times;</button>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-panel="sessionsPanel">Sessions</button>
    <button class="sidebar-tab" data-panel="browserPanel">Browse</button>
  </div>

  <!-- Sessions panel -->
  <div class="sidebar-panel active" id="sessionsPanel">
    <div class="session-list" id="sessionList"></div>
    <button class="add-btn" id="addSession">+ New Session</button>
  </div>

  <!-- File browser panel -->
  <div class="sidebar-panel" id="browserPanel">
    <div class="browser-crumbs" id="browserCrumbs"></div>
    <div class="browser" id="browserList"></div>
    <div class="browser-actions">
      <button class="cd-btn" id="cdBtn">cd here</button>
      <button class="create-session-btn" id="createSessionBtn" style="display:none;">Create Session</button>
      <button class="hidden-toggle" id="hiddenToggle">.hidden</button>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" id="openSidebar">&#9776;</button>
    <span class="session-label" id="sessionName">--</span>
    <div class="dot" id="connDot"></div>
    <button class="reconnect-btn" id="resessionBtn" title="Kill and recreate session at same dir" style="color:var(--red);margin-left:auto;">&times; Re-session</button>
  </div>

  <div class="term-wrap" id="termWrap">
    <iframe id="termFrame" src="about:blank"></iframe>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <!-- Row 1: Most used keys + Claude toggle -->
    <div class="btn-row" id="keysRow">
      <button class="kb" id="menuBtn2" style="background:var(--accent);color:var(--bg);">&#9776;</button>
      <button class="kb" id="reloadBtn" style="color:var(--green);">&#x21bb;</button>
      <button class="kb" data-key="Escape">Esc</button>
      <button class="kb" data-key="Tab">Tab</button>
      <button class="kb" data-key="BTab">S-Tab</button>
      <button class="kb" data-scroll="up">PgUp</button>
      <button class="kb" data-scroll="down">PgDn</button>
      <button class="kb" data-scroll="exit" style="color:var(--yellow);">Exit</button>
      <button class="kb" data-key="Left">&larr;</button>
      <button class="kb" data-key="Down">&darr;</button>
      <button class="kb" data-key="Up">&uarr;</button>
      <button class="kb" data-key="Right">&rarr;</button>
      <button class="kb" data-key="Enter">Enter</button>
      <button class="kb" data-key="C-c">^C</button>
      <button class="kb" data-key="C-d">^D</button>
      <button class="kb" data-key="C-z">^Z</button>
      <button class="kb" data-key="C-r">^R</button>
      <button class="kb" data-key="C-l">^L</button>
      <button class="kb" data-key="C-a">^A</button>
      <button class="kb" data-key="C-e">^E</button>
      <button class="kb" data-key="C-w">^W</button>
      <button class="kb" data-key="C-u">^U</button>
      <button class="kb claude" id="claudeToggle">Claude</button>
    </div>

    <!-- Row 2: Claude shortcuts (hidden by default) -->
    <div class="btn-row claude-row hidden" id="claudeRow">
      <button class="kb claude" data-cmd="claude">claude</button>
      <button class="kb claude" data-cmd="claude --dangerously-skip-permissions">--skip</button>
      <button class="kb claude" data-cmd="claude --resume">--resume</button>
      <button class="kb claude" data-cmd="claude --dangerously-skip-permissions --resume">--skip --resume</button>
      <button class="kb claude" data-cmd="claude --model sonnet">--model sonnet</button>
      <button class="kb claude" data-cmd="claude --model opus">--model opus</button>
      <button class="kb claude" data-cmd="/compact">/compact</button>
      <button class="kb claude" data-cmd="y">y</button>
      <button class="kb claude" data-cmd="yes">yes</button>
    </div>

    <!-- Row 3: Text input + Send + Enter -->
    <div class="input-row">
      <textarea id="cmdInput" rows="1" placeholder="Input..."
        autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"
      ></textarea>
      <button class="act-btn send-btn" id="sendBtn">Send</button>
      <button class="act-btn enter-btn" id="enterBtn">Run</button>
    </div>
  </div>
</div>

<script>
const HOST = location.hostname;
let currentSession = null;

// Prevent page scroll on everything except iframe and textarea
document.addEventListener('touchmove', e => {
  if (e.target.closest('iframe') || e.target.closest('textarea') || e.target.closest('.btn-row')) return;
  e.preventDefault();
}, { passive: false });

// ========== Sidebar ==========
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

document.getElementById('openSidebar').addEventListener('click', openSidebar);
document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

// ========== Sessions ==========
async function fetchSessions() {
  const res = await fetch('/api/sessions');
  const sessions = await res.json();
  renderSessions(sessions);
  return sessions;
}

function renderSessions(sessions) {
  const list = document.getElementById('sessionList');
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.name === currentSession ? 'active' : ''}" data-session="${s.name}">
      <span>${s.name}</span>
      <button class="del" data-del="${s.name}">&times;</button>
    </div>
  `).join('');

  list.querySelectorAll('.session-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.del')) return;
      switchSession(el.dataset.session);
    });
  });
  list.querySelectorAll('.del').forEach(el => {
    el.addEventListener('click', () => deleteSession(el.dataset.del));
  });
}

let browserMode = 'browse'; // 'browse' or 'new-session'

document.getElementById('addSession').addEventListener('click', () => {
  // Switch to Browse tab in new-session mode
  browserMode = 'new-session';
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="browserPanel"]').classList.add('active');
  document.getElementById('browserPanel').classList.add('active');
  // Show create button, hide cd button
  document.getElementById('cdBtn').style.display = 'none';
  document.getElementById('createSessionBtn').style.display = '';
  // Browse starting at home directory
  browseTo(HOME_DIR);
});

// When switching back to browse tab normally, reset mode
document.getElementById('createSessionBtn').addEventListener('click', async () => {
  if (!browserPath) return;
  const dirName = browserPath.split('/').filter(Boolean).pop() || 'main';
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: dirName, cwd: browserPath })
  });
  const data = await res.json();
  // Reset browser mode
  browserMode = 'browse';
  document.getElementById('cdBtn').style.display = '';
  document.getElementById('createSessionBtn').style.display = 'none';
  // Switch to sessions tab
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="sessionsPanel"]').classList.add('active');
  document.getElementById('sessionsPanel').classList.add('active');
  await fetchSessions();
  switchSession(data.name);
});

async function deleteSession(name) {
  if (!confirm(`Delete "${name}"?`)) return;
  await fetch('/api/sessions', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  if (currentSession === name) {
    currentSession = null;
    document.getElementById('termFrame').src = 'about:blank';
    document.getElementById('sessionName').textContent = '--';
  }
  fetchSessions();
}

let currentPort = null;
let currentTtydHost = null;

async function switchSession(name) {
  currentSession = name;
  document.getElementById('sessionName').textContent = name;
  localStorage.setItem('lastSession', name);
  fetchSessions();

  const res = await fetch('/api/connect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: name })
  });
  const data = await res.json();
  if (data.ok) {
    currentPort = data.port;
    currentTtydHost = data.host || HOST;
    loadTermFrame(`http://${currentTtydHost}:${data.port}`);
  }
  if (window.innerWidth < 768) closeSidebar();
}

function loadTermFrame(url) {
  // Replace iframe entirely to avoid beforeunload dialog
  const wrap = document.getElementById('termWrap');
  const oldFrame = document.getElementById('termFrame');
  if (oldFrame) oldFrame.remove();
  const newFrame = document.createElement('iframe');
  newFrame.id = 'termFrame';
  newFrame.src = 'about:blank';
  wrap.insertBefore(newFrame, wrap.firstChild);
  setTimeout(() => {
    newFrame.src = url;
    document.getElementById('connDot').classList.remove('off');
  }, 300);
}

// Reload button - reload iframe
document.getElementById('reloadBtn').addEventListener('click', () => {
  if (currentPort) {
    loadTermFrame(`http://${currentTtydHost || HOST}:${currentPort}`);
  }
});

// Re-session button - kill session + tmux, recreate at same directory
document.getElementById('resessionBtn').addEventListener('click', async () => {
  if (!currentSession) return;
  const res = await fetch('/api/resession', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSession })
  });
  const data = await res.json();
  if (data.ok) {
    currentPort = data.port;
    currentTtydHost = data.host || HOST;
    setTimeout(() => loadTermFrame(`http://${currentTtydHost}:${data.port}`), 2000);
  }
});


// ========== Tap vs scroll detection for button rows ==========
function setupBtnRow(rowEl, handler) {
  rowEl.addEventListener('click', e => {
    const btn = e.target.closest('.kb');
    if (btn) {
      handler(btn);
      // Prevent iframe from getting focus and showing keyboard
      document.activeElement?.blur();
    }
  });
  rowEl.addEventListener('mousedown', e => {
    if (e.target.closest('.kb')) e.preventDefault();
  });
}

// ========== Key buttons ==========
// Menu button - direct event since setupBtnRow tap detection can be unreliable
document.getElementById('menuBtn2').addEventListener('click', openSidebar);

setupBtnRow(document.getElementById('keysRow'), btn => {
  if (btn.id === 'menuBtn2') {
    openSidebar();
  } else if (btn.id === 'claudeToggle') {
    toggleClaude();
  } else if (btn.dataset.key) {
    sendKey(btn.dataset.key);
  } else if (btn.dataset.scroll) {
    scrollTerminal(btn.dataset.scroll);
  }
});

let claudeRowLocked = false;
function toggleClaude() {
  const row = document.getElementById('claudeRow');
  const toggle = document.getElementById('claudeToggle');
  const opening = row.classList.contains('hidden');
  row.classList.toggle('hidden');
  toggle.classList.toggle('active');
  if (opening) {
    claudeRowLocked = true;
    row.style.pointerEvents = 'none';
    row.style.opacity = '0.5';
    setTimeout(() => {
      claudeRowLocked = false;
      row.style.pointerEvents = '';
      row.style.opacity = '';
    }, 400);
  }
}

async function scrollTerminal(direction) {
  if (!currentSession) return;
  await fetch('/api/scroll', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSession, direction })
  });
  // After exiting copy-mode, reload iframe to restore input
  if (direction === 'exit' && currentPort) {
    setTimeout(() => loadTermFrame(`http://${currentTtydHost || HOST}:${currentPort}`), 300);
  }
}

// ========== Claude shortcuts ==========
document.getElementById('claudeRow').addEventListener('click', e => {
  const btn = e.target.closest('.kb');
  if (btn && btn.dataset.cmd) {
    sendClaudeCmd(btn.dataset.cmd);
    document.activeElement?.blur();
  }
});

async function sendClaudeCmd(cmd) {
  if (!currentSession) return;
  await fetch('/api/send-text', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSession, text: cmd })
  });
}

// ========== Send keys ==========
async function flushInput() {
  const input = document.getElementById('cmdInput');
  const text = input.value;
  if (!text) return;
  await fetch('/api/send-literal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSession, text })
  });
  input.value = '';
  input.style.height = 'auto';
}

async function sendKey(key) {
  if (!currentSession) return;
  await flushInput();
  await fetch('/api/send-keys', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSession, keys: key })
  });
}

// ========== Send / Run buttons ==========
document.getElementById('sendBtn').addEventListener('click', doSend);
document.getElementById('enterBtn').addEventListener('click', doRun);

// Send = flush text to terminal (no Enter)
async function doSend() {
  if (!currentSession) return;
  await flushInput();
}

// Run = flush text + Enter
async function doRun() {
  if (!currentSession) return;
  const input = document.getElementById('cmdInput');
  const text = input.value;
  if (text) {
    await fetch('/api/send-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: currentSession, text })
    });
    input.value = '';
    input.style.height = 'auto';
  } else {
    // No text, just send Enter
    await fetch('/api/send-keys', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: currentSession, keys: 'Enter' })
    });
  }
  input.focus();
}

// Auto-resize textarea
document.getElementById('cmdInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ========== Sidebar tabs ==========
document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'browserPanel' && !browserLoaded) {
      browseTo(HOME_DIR);
    }
    // Reset browser mode when manually switching tabs
    if (tab.dataset.panel === 'sessionsPanel') {
      browserMode = 'browse';
      document.getElementById('cdBtn').style.display = '';
      document.getElementById('createSessionBtn').style.display = 'none';
    }
  });
});

// ========== File browser ==========
let browserPath = '';
let browserLoaded = false;
let HOME_DIR = '/';
fetch('/api/home').then(r => r.json()).then(d => { HOME_DIR = d.home; browserPath = HOME_DIR; });
let showHidden = false;

async function browseTo(dirPath) {
  browserLoaded = true;
  const res = await fetch('/api/ls', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: dirPath, showHidden })
  });
  const data = await res.json();
  if (!data.ok) return;
  browserPath = data.path;
  renderBrowser(data);
}

function renderBrowser(data) {
  // Breadcrumbs
  const parts = data.path.split('/').filter(Boolean);
  let crumbHtml = '<button class="browser-crumb" data-path="/">/</button>';
  let accumulated = '';
  for (const p of parts) {
    accumulated += '/' + p;
    crumbHtml += ` <button class="browser-crumb" data-path="${accumulated}">${p}</button>/`;
  }
  const crumbsEl = document.getElementById('browserCrumbs');
  crumbsEl.innerHTML = crumbHtml;
  crumbsEl.querySelectorAll('.browser-crumb').forEach(el => {
    el.addEventListener('click', () => browseTo(el.dataset.path));
  });

  // Directory + file list
  const listEl = document.getElementById('browserList');
  let html = '';

  // Parent dir
  if (data.path !== '/') {
    const parent = data.path.split('/').slice(0, -1).join('/') || '/';
    html += `<div class="browser-item" data-dir="${parent}"><span class="icon">&#8617;</span> ..</div>`;
  }

  for (const d of data.dirs) {
    const full = data.path === '/' ? '/' + d : data.path + '/' + d;
    html += `<div class="browser-item" data-dir="${full}"><span class="icon">&#128193;</span> ${d}</div>`;
  }
  for (const f of data.files) {
    html += `<div class="browser-item file"><span class="icon">&#128196;</span> ${f}</div>`;
  }

  listEl.innerHTML = html;
  listEl.querySelectorAll('.browser-item[data-dir]').forEach(el => {
    el.addEventListener('click', () => browseTo(el.dataset.dir));
  });
}

document.getElementById('cdBtn').addEventListener('click', () => {
  if (!currentSession || !browserPath) return;
  fetch('/api/send-text', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSession, text: `cd ${browserPath}` })
  });
  if (window.innerWidth < 768) closeSidebar();
});

document.getElementById('hiddenToggle').addEventListener('click', () => {
  showHidden = !showHidden;
  document.getElementById('hiddenToggle').classList.toggle('on', showHidden);
  browseTo(browserPath);
});

// ========== Init ==========
async function init() {
  const sessions = await fetchSessions();
  const last = localStorage.getItem('lastSession');

  if (sessions.length === 0) {
    // No sessions - open sidebar in new-session mode
    openSidebar();
    document.getElementById('addSession').click();
  } else if (last && sessions.find(s => s.name === last)) {
    switchSession(last);
  } else {
    switchSession(sessions[0].name);
  }
}

init();
</script>
