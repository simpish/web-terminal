<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Web Terminal</title>
<link rel="stylesheet" href="/index.css">
</head>
<body>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>Terminal</span>
    <select id="themeSelect" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px;">
      <option value="github-dark">GitHub Dark</option>
      <option value="monokai">Monokai</option>
      <option value="dracula">Dracula</option>
      <option value="solarized">Solarized</option>
      <option value="nord">Nord</option>
    </select>
    <button class="menu-btn" id="closeSidebar">&times;</button>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-panel="sessionsPanel">Sessions</button>
    <button class="sidebar-tab" data-panel="browserPanel">Browse</button>
  </div>

  <!-- Sessions panel -->
  <div class="sidebar-panel active" id="sessionsPanel">
    <div class="session-list" id="sessionList"></div>
    <button class="add-btn" id="addSession">+ New Session</button>
  </div>

  <!-- File browser panel -->
  <div class="sidebar-panel" id="browserPanel">
    <div class="browser-crumbs" id="browserCrumbs"></div>
    <div class="browser" id="browserList"></div>
    <div class="browser-actions">
      <button class="cd-btn" id="cdBtn">cd here</button>
      <button class="create-session-btn" id="createSessionBtn" style="display:none;">Create Session</button>
      <button class="hidden-toggle" id="hiddenToggle">.hidden</button>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" id="openSidebar">&#9776;</button>
    <span class="session-label" id="sessionName">--</span>
    <button class="rename-btn" id="renameBtn" title="Rename session">&#9998;</button>
    <div class="font-size-ctrl">
      <button class="fs-btn" id="fontMinus" title="Shrink font">&#x2212;</button>
      <span class="fs-label" id="fontLabel">100%</span>
      <button class="fs-btn" id="fontPlus" title="Enlarge font">&#x2b;</button>
    </div>
    <div class="dot" id="connDot"></div>
    <button class="reconnect-btn" id="resessionBtn" title="Kill and recreate session at same dir" style="color:var(--red);margin-left:auto;">&times; Re-session</button>
  </div>

  <div class="term-wrap" id="termWrap">
    <iframe id="termFrame" src="about:blank"></iframe>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <!-- Row 1: Most used keys + Claude toggle -->
    <div class="btn-row" id="keysRow">
      <button class="kb" id="menuBtn2" style="background:var(--accent);color:var(--bg);">&#9776;</button>
      <button class="kb" id="reloadBtn" style="color:var(--green);">&#x21bb;</button>
      <button class="kb" data-key="Escape">Esc</button>
      <button class="kb" data-key="Tab">Tab</button>
      <button class="kb" data-key="BTab">S-Tab</button>
      <button class="kb" data-scroll="up">PgUp</button>
      <button class="kb" data-scroll="down">PgDn</button>
      <button class="kb" data-scroll="exit" style="color:var(--yellow);">Exit</button>
      <button class="kb" data-key="Left">&larr;</button>
      <button class="kb" data-key="Down">&darr;</button>
      <button class="kb" data-key="Up">&uarr;</button>
      <button class="kb" data-key="Right">&rarr;</button>
      <button class="kb" data-key="Enter">Enter</button>
      <button class="kb" data-key="C-c">^C</button>
      <button class="kb" data-key="C-d">^D</button>
      <button class="kb" data-key="C-z">^Z</button>
      <button class="kb" data-key="C-r">^R</button>
      <button class="kb" data-key="C-l">^L</button>
      <button class="kb" data-key="C-a">^A</button>
      <button class="kb" data-key="C-e">^E</button>
      <button class="kb" data-key="C-w">^W</button>
      <button class="kb" data-key="C-u">^U</button>
      <button class="kb claude" id="claudeToggle">Claude</button>
    </div>

    <!-- Row 2: Claude shortcuts (hidden by default) -->
    <div class="btn-row claude-row hidden" id="claudeRow">
      <button class="kb claude" data-cmd="claude">claude</button>
      <button class="kb claude" data-cmd="claude --dangerously-skip-permissions">--skip</button>
      <button class="kb claude" data-cmd="claude --resume">--resume</button>
      <button class="kb claude" data-cmd="claude --dangerously-skip-permissions --resume">--skip --resume</button>
      <button class="kb claude" data-cmd="claude --model sonnet">--model sonnet</button>
      <button class="kb claude" data-cmd="claude --model opus">--model opus</button>
      <button class="kb claude" data-cmd="/compact">/compact</button>
      <button class="kb claude" data-cmd="y">y</button>
      <button class="kb claude" data-cmd="yes">yes</button>
    </div>

    <!-- Row 3: Text input + Send + Enter -->
    <div class="input-row">
      <textarea id="cmdInput" rows="1" placeholder="Input..."
        autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"
      ></textarea>
      <button class="act-btn send-btn" id="sendBtn">Send</button>
      <button class="act-btn enter-btn" id="enterBtn">Run</button>
    </div>
  </div>
</div>

<script src="/index.js"></script>
</body>
</html>
